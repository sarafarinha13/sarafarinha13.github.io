<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- conectar google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

    <!-- conectar los emoticonos de Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body >

    <div class="header">
        <img class="header_logo" src="img/logo.png">
        <div class="header_user">
            <img class="header_avatar" src="img/1 (7).jpg">
            <p class="header_username">@prisionMike</p>
        </div>
    </div>

    <div class="news_bar">
        <span class="news_text">The News of Dunder Mifflin • What's up in Dunder Mifflin • That's what she said</span>
    </div>


    <div class="tuit">
        <textarea id="tuit" rows="4" placeholder="What's up in Dunder Mifflin?"></textarea>
        <button id="buttonTuit">Publicar</button>
    </div>

    <div id="contenedor"></div>


    <script src="script.js"></script>
</body>

</html>
