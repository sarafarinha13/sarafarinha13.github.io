<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>Proyectos Java</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
        rel="stylesheet">

</head>

<body>


    <header id="header-index">
        <h1>PROYECTOS JAVA</h1>
        <img id="asterisco" src="img/asterisco.png" alt="Asterisco decorativo">
    </header>

    <div class="pagina-proyectos">
        <div class="botones-proyectos">

            <button class="boton-portfolio" onclick="cambiarProyecto('img/proyecto-java/marioParty.png')">
                Juegos Mario Party
            </button>

            <button class="boton-portfolio" onclick="cambiarProyecto('img/proyecto-java/ahorcado.png')">
                Ahorcado
            </button>

            <button class="boton-portfolio" onclick="cambiarProyecto('img/proyecto-java/calculadora.png')">
                Calculadora
            </button>



        </div>

        <img id="visor-web" src="img/proyecto-java/marioParty.png">


        <a href="index.html" class="boton-portfolio">
            VOLVER AL HOME
        </a>

    </div>

<script>

    function cambiarProyecto(web) {
        document.querySelector("#visor-web").src = web;
    }

    window.addEventListener("DOMContentLoaded", () => {
        //sirve para buscar despues del ? y lo transforma en algo que pueda leer el js
        // URLSearchParams =  convierte lo de dentro en algo que sea localizado por .get()
        const params = new URLSearchParams(window.location.search); 
        const proyecto = params.get("proyecto");

        if (proyecto === "ahorcado") {
            cambiarProyecto("img/proyecto-java/ahorcado.png");
        } else if (proyecto === "marioparty") {
            cambiarProyecto("img/proyecto-java/marioParty.png");
        } else if (proyecto === "calculadora") {
            cambiarProyecto("img/proyecto-java/calculadora.png");
        }
    });

</script>

</body>

</html>
